name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Open ticket on failure
        if: >-
          failure() &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/ci-failure-ticket.sh "quality" "${{ github.run_id }}"

  changeset-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Check for changesets
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '^packages/.*/src/' || true)
          if [ -n "$CHANGED" ]; then
            CHANGESETS=$(git diff --name-only origin/main...HEAD | grep -E '^\.changeset/.*\.md$' || true)
            if [ -z "$CHANGESETS" ]; then
              echo "::warning::Source files changed in publishable packages but no changeset found. Run 'pnpm changeset' before merging."
            fi
          fi
      - name: Open ticket on failure
        if: >-
          failure() &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/ci-failure-ticket.sh "changeset-check" "${{ github.run_id }}"
